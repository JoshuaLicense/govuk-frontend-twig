name: Dependabot

on:
  pull_request:

permissions:
  contents: read

jobs:
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Debug
        env:
          OUTPUT: ${{ toJson(steps.metadata.outputs) }}
        run: echo "$OUTPUT"
      - name: Merge
        if: ${{ steps.metadata.outputs.dependency-group != '' && steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Skip Merge
        if: ${{ steps.metadata.outputs.dependency-group == '' || steps.metadata.outputs.update-type == 'version-update:semver-major' }}
        run: echo "Not merging PR as it does not belong to a dependency group or is a major version update."
